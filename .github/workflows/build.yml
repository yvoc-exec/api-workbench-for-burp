name: Build & Validate API Workbench JAR

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core tests (Ubuntu, JDK 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Run Maven verify with JaCoCo thresholds
        run: mvn -B clean verify
      - name: Upload core test reports and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-tests-reports-ubuntu-java17
          if-no-files-found: warn
          path: |
            target/site/jacoco/**
            target/jacoco.exec
            target/surefire-reports/**
            target/failsafe-reports/**
            target/*.dump
            target/*.dumpstream

  compatibility-tests:
    name: Compatibility tests (${{ matrix.label }}, JDK ${{ matrix.java }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Ubuntu
            runs-on: ubuntu-latest
            java: '21'
          - label: Ubuntu
            runs-on: ubuntu-latest
            java: '25'
          - label: Windows
            runs-on: windows-latest
            java: '17'
          - label: Windows
            runs-on: windows-latest
            java: '25'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven
      - name: Run Maven verify
        run: mvn -B clean verify
      - name: Upload compatibility test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-tests-reports-${{ matrix.label }}-java${{ matrix.java }}
          if-no-files-found: warn
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
            target/*.dump
            target/*.dumpstream

  ui-tests:
    name: UI tests (Ubuntu, JDK 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Run UI tests under Xvfb
        run: xvfb-run -a mvn -B verify -Pui-tests
      - name: Upload UI test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-tests-reports-ubuntu-java17
          if-no-files-found: warn
          path: |
            target/site/jacoco/**
            target/jacoco.exec
            target/surefire-reports/**
            target/failsafe-reports/**
            target/*.dump
            target/*.dumpstream

  static-analysis:
    name: Static analysis (Ubuntu, JDK 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Run static analysis profile
        run: mvn -B verify -Pstatic-analysis
      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports-ubuntu-java17
          if-no-files-found: warn
          path: |
            target/spotbugsXml.xml
            target/spotbugs.html
            target/site/spotbugs/**

  performance-tests:
    name: Performance tests (Ubuntu, JDK 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Run performance profile
        run: mvn -B verify -Pperformance-tests
      - name: Upload performance test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-tests-reports-ubuntu-java17
          if-no-files-found: warn
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
            target/*.dump
            target/*.dumpstream

  mutation-tests:
    name: Mutation tests (Ubuntu, JDK 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Run PIT mutation coverage
        run: mvn -B test-compile -Pmutation-tests org.pitest:pitest-maven:mutationCoverage
      - name: Upload PIT and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-tests-reports-ubuntu-java17
          if-no-files-found: warn
          path: |
            target/pit-reports/**
            target/pit-*.xml
            target/surefire-reports/**
            target/failsafe-reports/**
            target/*.dump
            target/*.dumpstream

  package-jar:
    name: Package validated shaded JAR (Ubuntu, JDK 17)
    runs-on: ubuntu-latest
    needs:
      - core-tests
      - compatibility-tests
      - ui-tests
      - static-analysis
      - performance-tests
      - mutation-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Build shaded JAR
        run: mvn -B clean package
      - name: Resolve and validate shaded JAR
        id: validate-jar
        run: |
          shopt -s nullglob
          jars=(target/*-jar-with-dependencies.jar)
          if [ "${#jars[@]}" -ne 1 ]; then
            echo "Expected exactly one shaded JAR, found ${#jars[@]}"
            printf '%s\n' "${jars[@]}"
            exit 1
          fi
          jar="${jars[0]}"
          size=$(stat -c%s "$jar")
          if [ "$size" -lt 1000000 ]; then
            echo "Shaded JAR is unexpectedly small: $size"
            exit 1
          fi
          jar tf "$jar" > target/jar-contents.txt
          grep -q 'burp/BurpExtender.class' target/jar-contents.txt
          grep -q 'burp/smoke/ScriptRuntimeProbe.class' target/jar-contents.txt
          grep -q 'org/graalvm/polyglot/Context.class' target/jar-contents.txt
          grep -q 'org/openjdk/nashorn/api/scripting/NashornScriptEngineFactory.class' target/jar-contents.txt
          if grep -Eq 'burp/smoke/SmokeRuntimeConfig.class|burp/smoke/SmokeRuntimeRunner.class|burp/smoke/SmokeRuntimeResult.class|burp/smoke/SmokeUiEvidenceSnapshot.class' target/jar-contents.txt; then
            echo "Deleted smoke hook classes are still packaged"
            exit 1
          fi
          echo "path=$jar" >> "$GITHUB_OUTPUT"
          echo "size=$size" >> "$GITHUB_OUTPUT"
      - name: Probe shaded runtime artifact
        run: java -cp "${{ steps.validate-jar.outputs.path }}" burp.smoke.ScriptRuntimeProbe --require-full
      - name: Upload canonical shaded JAR
        uses: actions/upload-artifact@v4
        with:
          name: api-workbench-for-burp-validated-java17
          if-no-files-found: error
          path: ${{ steps.validate-jar.outputs.path }}
