name: Clean One-shot Full Validation Workflow

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-one-shot-full-validation.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Remove one-shot full validation workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          path='.github/workflows/one-shot-full-validation.yml'
          sha="$(gh api "repos/$GITHUB_REPOSITORY/contents/$path?ref=main" --jq .sha)"
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/contents/$path" \
            -f message='ci: remove one-shot full validation workflow' \
            -f sha="$sha" \
            -f branch='main'
