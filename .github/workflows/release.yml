name: Release JAR

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/build.yml
    with:
      mode: full

  publish:
    name: Publish validated release artifact
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download validated canonical JAR
        uses: actions/download-artifact@v8.0.1
        with:
          name: api-workbench-for-burp-validated-java17
          path: release-artifact
      - name: Set up JDK 17
        uses: actions/setup-java@v5.3.0
        with:
          distribution: temurin
          java-version: '17'
      - name: Validate downloaded shaded JAR
        id: validate-jar
        shell: bash
        run: |
          shopt -s nullglob
          jars=(release-artifact/*-jar-with-dependencies.jar)
          if [ "${#jars[@]}" -ne 1 ]; then
            echo "Expected exactly one shaded JAR, found ${#jars[@]}" >&2
            printf '%s\n' "${jars[@]}"
            exit 1
          fi

          jar="${jars[0]}"
          size=$(stat -c%s "$jar")
          if [ "$size" -lt 1000000 ]; then
            echo "Shaded JAR is unexpectedly small: $size" >&2
            exit 1
          fi

          jar tf "$jar" > release-artifact/jar-contents.txt
          grep -q 'burp/BurpExtender.class' release-artifact/jar-contents.txt
          grep -q 'burp/smoke/ScriptRuntimeProbe.class' release-artifact/jar-contents.txt
          grep -q 'org/graalvm/polyglot/Context.class' release-artifact/jar-contents.txt
          grep -q 'org/openjdk/nashorn/api/scripting/NashornScriptEngineFactory.class' release-artifact/jar-contents.txt

          if grep -Eq 'burp/smoke/SmokeRuntimeConfig.class|burp/smoke/SmokeRuntimeRunner.class|burp/smoke/SmokeRuntimeResult.class|burp/smoke/SmokeUiEvidenceSnapshot.class' release-artifact/jar-contents.txt; then
            echo "Removed smoke hook classes are still packaged" >&2
            exit 1
          fi

          echo "path=$jar" >> "$GITHUB_OUTPUT"
      - name: Probe downloaded runtime artifact
        run: java -cp "${{ steps.validate-jar.outputs.path }}" burp.smoke.ScriptRuntimeProbe --require-full
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.validate-jar.outputs.path }}
          generate_release_notes: true
