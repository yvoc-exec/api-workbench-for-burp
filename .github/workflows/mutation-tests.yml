name: Mutation Test Suite

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 6'

jobs:
  mutation-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run PIT mutation coverage
        run: mvn -B org.pitest:pitest-maven:mutationCoverage -Pmutation-tests
      - name: Upload PIT reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-test-reports
          if-no-files-found: warn
          path: |
            target/pit-reports/**
            target/pit-*.xml
