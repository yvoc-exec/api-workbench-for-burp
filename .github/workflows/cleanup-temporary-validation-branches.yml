name: Clean Temporary Validation Branches

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-temporary-validation-branches.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete temporary validation branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/validation%2Fsandbox-857c0c2" || true
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/validation%2Ffull-ci-4486b99" || true
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/heads/review-4486b99" || true

      - name: Remove this one-shot workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          path='.github/workflows/cleanup-temporary-validation-branches.yml'
          sha="$(gh api "repos/$GITHUB_REPOSITORY/contents/$path?ref=main" --jq .sha)"
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/contents/$path" \
            -f message='ci: remove temporary cleanup workflow' \
            -f sha="$sha" \
            -f branch='main'
