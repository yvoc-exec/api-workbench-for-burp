name: ChatGPT Apply Pass 1 Patch

# Triggered by ChatGPT after workflow creation.
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/chatgpt-apply-pass1.yml'
      - '.chatgpt/api-workbench-pass1.patch.b64'

permissions:
  contents: write

jobs:
  apply-pass1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Decode and apply patch
        run: |
          base64 -d .chatgpt/api-workbench-pass1.patch.b64 > /tmp/api-workbench-pass1.patch
          git apply -p2 /tmp/api-workbench-pass1.patch

      - name: Run targeted tests
        run: mvn test -Dtest=ImporterPanelTreeRestoreTest,ImporterPanelVariablesResolutionTest

      - name: Remove temporary patch files
        run: |
          rm -f .chatgpt/api-workbench-pass1.patch.b64
          rmdir .chatgpt 2>/dev/null || true
          rm -f .github/workflows/chatgpt-apply-pass1.yml

      - name: Commit applied patch
        run: |
          git add src/main/java/burp/ui/ImporterPanel.java \
                  src/test/java/burp/ui/ImporterPanelTreeRestoreTest.java \
                  src/test/java/burp/ui/ImporterPanelVariablesResolutionTest.java \
                  .chatgpt \
                  .github/workflows/chatgpt-apply-pass1.yml
          git commit -m "Fix workspace tree restore and variables draft preview"
          git push
